name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml version matches tag
        run: |
          CARGO_VERSION="v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG)"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION == $TAG"

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
